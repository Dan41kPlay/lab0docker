version: '3.8'

services:
  web:
    build: .
    container_name: mvc-web
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: dp
      DB_PASS: dp229
      DB_NAME: dp-db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: dp-db-c
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: dp-db
      MYSQL_USER: dp
      MYSQL_PASSWORD: dp229
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
